<!DOCTYPE html>
<html lang="it">


<head>

<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Studio canto
</title>



<link rel="stylesheet" href="style.css">


<link rel="manifest" href="manifest.json">


<meta name="theme-color" content="#1565c0">


<script src="https://unpkg.com/lucide@latest"></script>


</head>





<body>



<a href="index.html">

<button class="back-button">

<i data-lucide="arrow-left"></i>

Canti

</button>

</a>





<header>


<div class="logo">

<i data-lucide="file-music"></i>

</div>



<h1 id="titolo">

Caricamento...

</h1>



<p id="autore">

</p>




<button id="tema">

<i data-lucide="moon"></i>

</button>



</header>







<h2>

<i data-lucide="mic-2"></i>

La tua parte

</h2>






<div class="voci">


<button 
class="voce attiva"
data-voce="tutti">

<i data-lucide="music"></i>

Tutte

</button>




<button
class="voce"
data-voce="soprano">

<i data-lucide="mic-2"></i>

Soprano

</button>




<button
class="voce"
data-voce="contralto">

<i data-lucide="mic-2"></i>

Contralto

</button>




<button
class="voce"
data-voce="tenore">

<i data-lucide="mic-2"></i>

Tenore

</button>




<button
class="voce"
data-voce="basso">

<i data-lucide="mic-2"></i>

Basso

</button>



</div>








<div class="player">


<audio id="audio"></audio>



<div class="time">

<span id="tempoAttuale">
00:00
</span>


/


<span id="durata">
00:00
</span>

</div>




<div class="progress">


<div
class="progress-bar"
id="barra">

</div>


</div>





<div class="controls">


<button id="indietro15">

<i data-lucide="rewind"></i>

15

</button>




<button id="indietro5">

-5

</button>





<button id="play">


<i data-lucide="play"></i>


</button>





<button id="avanti5">

+5

</button>





<button id="avanti15">

<i data-lucide="fast-forward"></i>

15

</button>



</div>







<div class="controls velocita">


<button data-speed="0.75">

0.75×

</button>


<button data-speed="1">

1×

</button>


<button data-speed="1.25">

1.25×

</button>


<button data-speed="1.5">

1.5×

</button>



</div>







<div class="volume-box">


<i data-lucide="volume-2"></i>



<input
type="range"
id="volume"
min="0"
max="1"
step="0.05"
value="1"
>


</div>




</div>







<button id="studio">

<i data-lucide="book-open"></i>

Modalità studio

</button>







<div id="spartito">

</div>







<h2>

<i data-lucide="list-music"></i>

Sezioni

</h2>





<div id="sezioni">

</div>






<script src="canto.js"></script>




<script>

lucide.createIcons();

</script>



</body>


</html>
