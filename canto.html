<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Studio canto
</title>


<link rel="stylesheet" href="style.css">


<link rel="manifest" href="manifest.json">


<meta name="theme-color" content="#1e88e5">


</head>



<body>


<div class="app">



<header class="song-header">


<a href="index.html" class="back-link">

← Canti

</a>



<h1 id="titolo">

Caricamento...

</h1>


<p id="autore">

</p>


</header>







<section class="box">


<h2>

La tua parte

</h2>



<div class="voci">


<button
class="voce attiva"
data-voce="tutti">

Tutte

</button>



<button
class="voce"
data-voce="soprano">

Soprano

</button>




<button
class="voce"
data-voce="contralto">

Contralto

</button>




<button
class="voce"
data-voce="tenore">

Tenore

</button>




<button
class="voce"
data-voce="basso">

Basso

</button>


</div>


</section>







<section class="player-box">


<audio id="audio"></audio>



<div class="current-part">


<span>
Stai studiando:
</span>


<strong id="parteCorrente">
Tutte le voci
</strong>


</div>





<div class="big-play">


<button id="play">

▶

</button>


</div>





<div class="time-display">


<span id="tempoAttuale">
00:00
</span>


<span>
/
</span>


<span id="durata">
00:00
</span>


</div>







<div class="progress-container">


<div class="progress">


<div id="barra">

</div>


</div>


</div>







<div class="quick-controls">


<button id="indietro5">

⏪ 5

</button>




<button id="avanti5">

5 ⏩

</button>



</div>







<div class="repeat-control">


<button id="ripeti">

🔁 Ripeti sezione

</button>


</div>







<div class="speed-box">


<p>

Velocità

</p>


<div class="speed-controls">


<button data-speed="0.75">

0.75x

</button>



<button data-speed="1">

1x

</button>



<button data-speed="1.25">

1.25x

</button>



<button data-speed="1.5">

1.5x

</button>


</div>


</div>







<div class="volume-box">


🔊


<input
id="volume"
type="range"
min="0"
max="1"
step="0.05"
value="1"
>


</div>



</section>
<section class="box spartito-box">


<h2>

Spartito

</h2>



<div id="spartito">


</div>



</section>







<section class="sections-box">


<h2>

Sezioni del canto

</h2>




<div id="sezioni">


</div>



</section>








<button id="studio" class="studio-button">

Modalità studio

</button>





</div>







<script src="canto.js"></script>


<script>

if(
"serviceWorker" in navigator
){

navigator.serviceWorker.register(
"service-worker.js"
);

}


</script>



</body>

</html>
